name: Release

# Tag a version (e.g. `git tag v0.1.0 && git push --tags`) to publish both
# the npm server package and the VS Code extension.
#
# Required repository secrets:
#   NPM_TOKEN  - npm automation token (npmjs.com -> Access Tokens)
#   VSCE_PAT   - Azure DevOps PAT with Marketplace > Manage scope
#
# The npm package is published first because the extension's first-run
# bootstrap installs that exact version.

on:
  push:
    tags:
      - "v*"

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - run: npm install
      - run: npm run build
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-extension:
    needs: publish-npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - working-directory: extension
        run: npm install
      - name: Publish to VS Code Marketplace
        working-directory: extension
        run: npx --yes @vscode/vsce publish -p "$VSCE_PAT"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

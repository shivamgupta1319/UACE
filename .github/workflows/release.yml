name: Release

# Tag a version (e.g. `git tag v0.1.0 && git push --tags`) to publish both
# the npm server package and the VS Code extension.
#
# npm publishes via Trusted Publishing (OIDC) — NO npm token needed. Configure the
# trusted publisher on npmjs.com (package -> Settings -> Trusted Publisher ->
# GitHub Actions: shivamgupta1319/UACE, workflow release.yml).
#
# Required repository secrets (extension only):
#   VSCE_PAT   - Azure DevOps PAT with Marketplace > Manage scope (optional; MS
#                Marketplace step is skipped when unset and updated manually).
#   OVSX_PAT   - Open VSX access token (open-vsx.org -> Settings -> Access Tokens),
#                lets Cursor / Antigravity / VSCodium discover the extension.
#
# The npm package is published first because the extension's first-run
# bootstrap installs that exact version.

on:
  push:
    tags:
      - "v*"

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for npm Trusted Publishing (OIDC)
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - run: npm install
      - run: npm run build
      # Trusted Publishing requires npm >= 11.5.1 (Node 20 ships npm 10).
      - run: npm install -g npm@latest
      - run: npm publish --access public

  publish-extension:
    needs: publish-npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - working-directory: extension
        run: npm install
      # Package once, then publish the SAME .vsix to both marketplaces so the
      # bundle is byte-identical across registries.
      - name: Package extension
        working-directory: extension
        run: npx --yes @vscode/vsce package -o uace-dashboard.vsix
      # Skipped cleanly when VSCE_PAT isn't set (MS Marketplace updated manually),
      # so it never blocks the Open VSX publish below.
      - name: Publish to VS Code Marketplace
        working-directory: extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        if: ${{ env.VSCE_PAT != '' }}
        run: npx --yes @vscode/vsce publish --packagePath uace-dashboard.vsix -p "$VSCE_PAT"
      - name: Publish to Open VSX (Cursor / Antigravity / VSCodium)
        working-directory: extension
        run: npx --yes ovsx publish uace-dashboard.vsix -p "$OVSX_PAT"
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
